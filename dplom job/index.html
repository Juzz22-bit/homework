<!DOCTYPE html>
<html class="page" lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clothing store</title>
    <link rel="stylesheet" href="./css/index.css">
    <link rel="shortcut icon" href="./icons/icons-clothe 32-32px.png" type="image/x-icon">
</head>

<body class="page__body">
    <div class="top-banner">
        <div class="container top-banner__container">
            <span>Зарегистрируйтесь и получите скидку 20% на первую покупку. <a href="#">Зарегистрироваться
                    сейчас</a></span>
            <button class="top-banner__close">✕</button>
        </div>
    </div>
    <header class="header">
        <div class="container header__container">
            <button class="header__burger burger">
                <svg width="24" height="24">
                    <use class="burger__icon-menu" href="./icons/sprite.svg#burger"></use>
                </svg>
            </button>
            <a href="#" class="logo header__logo">SHOP.CO</a>
            <nav class="menu header__menu">
                <ul class="menu__list" aria-label="Главное Меню">
                    <li class="menu__item"><a href="#shop" class="menu__link">Магазин</a>
                        <button class="menu__link-button">
                            <svg width="16" height="16">
                                <use class="menu__link-icon" href="./icons/sprite.svg#menu"></use>
                            </svg>
                        </button>
                    </li>
                    <li class="menu__item"><a href="#disconts" class="menu__link">Скидки</a></li>
                    <li class="menu__item"><a href="#new" class="menu__link">Новые поступления</a></li>
                    <li class="menu__item"><a href="#brends" class="menu__link">Бренды</a></li>
                </ul>
            </nav>
            <div class="header__controls">
                <div class="search__menu">
                    <svg width="24" height="24">
                        <use href="./icons/sprite.svg#serth"></use>
                    </svg>
                    <input class="search" type="text" placeholder="Искать товары..." />
                </div>
                <div class="header__actions">
                    <button class="header__actions-button">
                        <svg width="24" height="24">
                            <use class="header__actions-icon" href="./icons/sprite.svg#basket">
                            </use>
                        </svg>
                    </button>
                    <button class="header__actions-button">
                        <svg width="24" height="24">
                            <use class="header__actions-icon" href="./icons/sprite.svg#profile">
                            </use>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>
</body>

</html>
